<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventPlace - Cadastro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <style>
        .navbar-logo { height: 40px; width: auto; margin-right: 10px; }
        .navbar-brand { display: flex; align-items: center; font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        
        /* Cores da Marca */
        .brand-event { color: #f38d31; } /* Laranja */
        .brand-place { color: #4b8cc9; } /* Azul */

        /* Ajuste nos cabeçalhos dos cards */
        .bg-azul-marca { background-color: #4b8cc9 !important; }
        .bg-laranja-marca { background-color: #f38d31 !important; }
        
        /* Ajuste nos botões para combinarem */
        .btn-azul-marca { background-color: #4b8cc9; color: white; border: none; }
        .btn-azul-marca:hover { background-color: #3a71a5; color: white; }
        
        .btn-laranja-marca { background-color: #f38d31; color: white; border: none; }
        .btn-laranja-marca:hover { background-color: #d67a28; color: white; }

        .card { border: none; border-radius: 1rem; overflow: hidden; }
        .form-label { font-weight: bold; font-size: 0.85rem; color: #666; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="navbar-logo">
                <span><span class="brand-event">Event</span><span class="brand-place">Place</span></span>
            </a>
            <a href="/" class="btn btn-outline-light btn-sm fw-bold">Voltar para Busca</a>
        </div>
    </nav>

<div class="container mt-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Área de Cadastro</h2>
            <p class="text-muted">Gerencie os dados da plataforma de forma simples.</p>
            
            {% if mensagem %}
            <div class="d-flex justify-content-center mt-3">
                <div style="border: 2px solid red; padding: 10px 30px; font-size: 1.1rem; font-weight: bold; color: #d9534f; background-color: #fdf2f2;">
                    {{ mensagem }}
                </div>
            </div>
            {% endif %}
            </div>

        <div class="row">
            ```

        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-azul-marca text-white p-3">
                        <h5 class="mb-0">👤 Cadastrar Proprietário</h5>
                    </div>
                    <div class="card-body p-4">
                        <form action="/cadastro" method="POST">
                            <input type="hidden" name="tipo_formulario" value="proprietario">
                            <div class="mb-3">
                                <label class="form-label text-uppercase">Nome Completo</label>
                                <input type="text" name="nome" class="form-control" placeholder="Digite o nome" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-uppercase">E-mail</label>
                                <input type="email" name="email" class="form-control" placeholder="email@exemplo.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-uppercase">Telefone</label>
                                <input type="text" name="telefone" class="form-control" placeholder="(00) 00000-0000" required>
                            </div>
                            <button type="submit" class="btn btn-azul-marca w-100 fw-bold py-2 mt-2">Salvar Proprietário</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-laranja-marca text-white p-3">
                        <h5 class="mb-0">🏠 Cadastrar Espaço</h5>
                    </div>
                    <div class="card-body p-4">
                        <form action="/cadastro" method="POST">
                            <input type="hidden" name="tipo_formulario" value="espaco">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label text-uppercase">ID Proprietário</label>
                                    <input type="number" name="id_proprietario" class="form-control" placeholder="Ex: 1" required>
                                </div>
                                <div class="col-md-8 mb-3">
                                    <label class="form-label text-uppercase">Nome do Espaço</label>
                                    <input type="text" name="nome" class="form-control" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-uppercase">Tipo</label>
                                    <select name="tipo" class="form-select" required>
                                        <option value="Salão de Festas">Salão de Festas</option>
                                        <option value="Chácara">Chácara</option>
                                        <option value="Auditório">Auditório</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-uppercase">Localização</label>
                                    <input type="text" name="localizacao" class="form-control" placeholder="Cidade" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label text-uppercase">Preço (R$)</label>
                                    <input type="number" step="0.01" name="preco" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-uppercase">Capacidade</label>
                                    <input type="number" name="capacidade" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-uppercase">Diferenciais</label>
                                <input type="text" name="diferenciais" class="form-control" placeholder="Piscina, Wi-Fi..." required>
                            </div>
                            <button type="submit" class="btn btn-laranja-marca w-100 fw-bold py-2">Salvar Espaço</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
