<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventPlace - Reservar Espaço</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        .brand-event { color: #f38d31; }
        .brand-place { color: #4b8cc9; }
        .bg-azul-marca { background-color: #4b8cc9 !important; }
        .btn-laranja-marca { background-color: #f38d31; color: white; border: none; }
        .btn-laranja-marca:hover { background-color: #e07b22; color: white; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="brand-event">Event</span><span class="brand-place">Place</span>
            </a>
            <a href="/" class="btn btn-outline-secondary btn-sm">Voltar à Vitrine</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                {% if mensagem %}
                <div class="d-flex justify-content-center mb-4">
                    <div style="border: 2px solid red; padding: 10px 30px; font-size: 1.1rem; font-weight: bold; color: #d9534f; background-color: #fdf2f2; text-align: center;">
                        {{ mensagem }}
                    </div>
                </div>
                {% endif %}

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-azul-marca text-white py-3">
                        <h4 class="mb-0 fw-bold">Solicitar Reserva</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <div class="alert alert-secondary mb-4">
                            <h5>Você está reservando: <strong>{{ espaco.nome }}</strong></h5>
                            <p class="mb-1"><i class="bi bi-geo-alt"></i> Local: {{ espaco.localizacao }}</p>
                            <p class="mb-0 text-success fw-bold">Valor: R$ {{ espaco.preco | moeda }} / dia</p>
                        </div>

                        <form method="POST">
                            <h6 class="text-uppercase text-muted fw-bold mb-3">Seus Dados</h6>
                            <div class="mb-3">
                                <label class="form-label">Nome Completo</label>
                                <input type="text" name="nome_cliente" class="form-control" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">E-mail</label>
                                    <input type="email" name="email_cliente" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Telefone / WhatsApp</label>
                                    <input type="text" name="telefone_cliente" class="form-control" required>
                                </div>
                            </div>
                            
                            <hr class="my-4">
                            
                            <h6 class="text-uppercase text-muted fw-bold mb-3">Detalhes do Evento</h6>
                            <div class="mb-4">
                                <label class="form-label">Data Desejada</label>
                                <input type="date" name="data_reserva" class="form-control" required>
                            </div>

                            <button type="submit" class="btn btn-laranja-marca w-100 fw-bold py-2 fs-5">Confirmar Solicitação</button>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
